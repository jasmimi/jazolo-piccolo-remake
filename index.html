<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>✨ Piccolo Remix ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div id="particles"></div>

  <!-- WELCOME -->
  <div id="screen-welcome" class="screen active">
    <div class="logo-wrap">
      <span class="logo-icon">✨</span>
      <h1 class="title-main">PICCOLO<br>REMIX</h1>
      <span class="logo-icon">✨</span>
    </div>
    <div class="title-sub">the fun version</div>
    <div class="sparkle-row">♥ ★ ♥ ★ ♥</div>
    <div class="welcome-tagline">tasks · dares · spotify · chaos</div>
    <button class="btn btn-primary" id="btn-play">PLAY!</button>
    <button class="btn btn-ghost" id="btn-music-toggle">🎵 MUSIC: ON</button>
  </div>

  <!-- PLAYERS -->
  <div id="screen-players" class="screen">
    <div class="screen-title">👑 WHO'S PLAYING?</div>
    <div class="input-row">
      <input class="input-name" id="name-input" type="text" maxlength="18" placeholder="player name..." autocomplete="off" autocorrect="off">
      <button class="btn-add" id="btn-add-player">+</button>
    </div>
    <div class="player-list" id="player-list"></div>
    <div class="player-hint" id="player-hint">add 2–8 players to start!</div>
    <button class="btn btn-gold" id="btn-start-game" disabled>START GAME! ★</button>
    <button class="btn btn-ghost" id="btn-back-welcome">back</button>
  </div>

  <!-- COUNTDOWN -->
  <div id="screen-countdown" class="screen">
    <div class="countdown-label">✨ game starts in ✨</div>
    <div class="countdown-number" id="countdown-num">3</div>
  </div>

  <!-- GAME -->
  <div id="screen-game" class="screen">
    <div class="game-header">
      <div class="round-badge">ROUND <span id="round-num">1</span></div>
      <div class="bomb-indicator" id="bomb-indicator">💣</div>
    </div>
    <div class="task-card" id="task-card">
      <div class="card-category" id="card-category">🎴 TASK</div>
      <div class="card-player-section">
        <div class="card-player-label">it's your turn,</div>
        <div class="card-player-name" id="card-player-name">PLAYER</div>
      </div>
      <div class="card-body">
        <div class="card-task-text" id="card-task-text">loading...</div>
      </div>
    </div>
    <button class="btn btn-primary" id="btn-next-card">NEXT CARD ▶</button>
    <button class="btn btn-ghost" id="btn-end-game">end game</button>
  </div>

  <!-- BOMB -->
  <div id="screen-bomb" class="screen">
    <div class="bomb-screen-inner">
      <div class="bomb-emoji-wrap">
        <span class="bomb-big">💥</span>
        <div class="explosion-rings">
          <div class="ring"></div>
          <div class="ring"></div>
          <div class="ring"></div>
        </div>
      </div>
      <div class="boom-text">BOOM!</div>
      <div class="bomb-loser" id="bomb-loser-text"></div>
      <div class="bomb-message">the bomb exploded! the game is over.<br>✨ thanks for playing ✨</div>
      <div class="bomb-btn-wrap">
        <button class="btn btn-gold" id="btn-play-again">PLAY AGAIN! ♥</button>
      </div>
    </div>
  </div>
  <script src="assets/js/app.js"></script>
</body>
</html>
