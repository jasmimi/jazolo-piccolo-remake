<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ Piccolo Remix ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --pink:#ff69b4;--deep-pink:#ff1493;--hot-pink:#ff007f;
      --purple:#a855f7;--dark-purple:#5b21b6;--deeper-purple:#3b0764;
      --lavender:#e9d5ff;--light-pink:#fce7f3;
      --gold:#fbbf24;--yellow:#fef08a;
      --white:#fdf4ff;--shadow:#3b0764;--text-dark:#3b0764;
    }
    html,body{height:100%;width:100%}
    body{
      font-family:'Press Start 2P','Courier New',monospace;
      background:linear-gradient(160deg,#1a0030 0%,#3b0764 30%,#7c3aed 60%,#c026d3 85%,#f0abfc 100%);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      position:relative;overflow:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse at 20% 50%,rgba(255,105,180,0.2) 0%,transparent 60%),
                 radial-gradient(ellipse at 80% 20%,rgba(168,85,247,0.2) 0%,transparent 60%);
      pointer-events:none;z-index:0;animation:bgShift 8s ease-in-out infinite alternate;
    }
    @keyframes bgShift{from{opacity:.7}to{opacity:1}}
    #particles{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
    .particle{position:absolute;font-size:1.1rem;animation:floatUp linear infinite;opacity:0;user-select:none}
    @keyframes floatUp{
      0%{transform:translateY(110vh) rotate(0deg);opacity:0}
      10%{opacity:1}90%{opacity:1}
      100%{transform:translateY(-10vh) rotate(360deg);opacity:0}
    }
    .screen{
      display:none;flex-direction:column;align-items:center;justify-content:center;
      position:fixed;inset:0;z-index:10;padding:24px 16px;overflow-y:auto;
      animation:screenIn .35s ease-out forwards;
    }
    .screen.active{display:flex}
    @keyframes screenIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
    .pixel-card{
      background:var(--white);border:4px solid var(--shadow);
      box-shadow:6px 6px 0 var(--shadow);border-radius:2px;
      padding:24px 20px;width:100%;max-width:440px;
    }
    .btn{
      font-family:'Press Start 2P',monospace;border:4px solid var(--shadow);
      box-shadow:4px 4px 0 var(--shadow);cursor:pointer;
      transition:transform .08s,box-shadow .08s;
      padding:14px 24px;font-size:.72rem;width:100%;max-width:440px;
      letter-spacing:.05em;text-align:center;display:block;
    }
    .btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--shadow)}
    .btn-primary{background:var(--pink);color:var(--white)}
    .btn-secondary{background:var(--purple);color:var(--white)}
    .btn-gold{background:var(--gold);color:var(--shadow)}
    .btn-ghost{background:transparent;color:var(--lavender);border-color:var(--lavender);box-shadow:3px 3px 0 rgba(255,255,255,.25);font-size:.6rem}
    .btn+.btn{margin-top:12px}

    /* WELCOME */
    #screen-welcome{gap:18px;text-align:center}
    .logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:4px}
    .logo-icon{font-size:2.2rem;animation:boing 1.4s ease-in-out infinite alternate;display:inline-block}
    @keyframes boing{from{transform:scale(1) rotate(-8deg)}to{transform:scale(1.15) rotate(8deg)}}
    .title-main{
      font-size:clamp(1.5rem,7vw,2.6rem);color:var(--gold);
      text-shadow:4px 4px 0 var(--shadow),-2px -2px 0 var(--hot-pink);
      line-height:1.25;letter-spacing:.04em;
    }
    .title-sub{font-size:clamp(.5rem,2.5vw,.75rem);color:var(--lavender);margin-top:6px;letter-spacing:.1em}
    .welcome-tagline{font-size:clamp(.45rem,2vw,.65rem);color:var(--yellow);margin-bottom:4px;line-height:2}

    /* PLAYERS */
    #screen-players{gap:14px}
    .screen-title{font-size:clamp(.7rem,3.5vw,1rem);color:var(--gold);text-shadow:3px 3px 0 var(--shadow);text-align:center;letter-spacing:.04em}
    .input-row{display:flex;gap:8px;width:100%;max-width:440px}
    .input-name{
      font-family:'Press Start 2P',monospace;flex:1;padding:12px 10px;font-size:.65rem;
      background:var(--white);border:4px solid var(--shadow);box-shadow:3px 3px 0 var(--shadow);
      color:var(--text-dark);outline:none;
    }
    .input-name::placeholder{color:#c084fc}
    .input-name:focus{border-color:var(--hot-pink);box-shadow:3px 3px 0 var(--hot-pink)}
    .btn-add{
      font-family:'Press Start 2P',monospace;font-size:1.2rem;
      padding:12px 16px;background:var(--pink);border:4px solid var(--shadow);
      box-shadow:3px 3px 0 var(--shadow);color:white;cursor:pointer;flex-shrink:0;
      transition:transform .08s,box-shadow .08s;
    }
    .btn-add:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--shadow)}
    .player-list{width:100%;max-width:440px;display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto}
    .player-chip{
      display:flex;align-items:center;justify-content:space-between;
      background:var(--lavender);border:3px solid var(--shadow);box-shadow:3px 3px 0 var(--shadow);
      padding:10px 12px;font-family:'Press Start 2P',monospace;font-size:.62rem;
      color:var(--text-dark);animation:popIn .2s ease-out;
    }
    @keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
    .player-remove{background:none;border:none;cursor:pointer;font-size:1rem;padding:2px 4px;color:var(--hot-pink)}
    .player-hint{font-size:.52rem;color:var(--lavender);text-align:center}

    /* GAME */
    #screen-game{gap:14px}
    .game-header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:440px}
    .round-badge{
      font-size:.52rem;color:var(--lavender);
      background:rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.2);padding:5px 9px;
    }
    .bomb-indicator{font-size:1.3rem;animation:bombPulse 2.5s ease-in-out infinite}
    @keyframes bombPulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:1;transform:scale(1.25)}}
    .bomb-indicator.danger{animation:bombDanger .5s ease-in-out infinite}
    @keyframes bombDanger{0%,100%{transform:scale(1)}50%{transform:scale(1.5);filter:drop-shadow(0 0 10px #ef4444)}}
    .task-card{
      width:100%;max-width:440px;min-height:280px;
      background:var(--white);border:4px solid var(--shadow);box-shadow:6px 6px 0 var(--shadow);
      border-radius:2px;display:flex;flex-direction:column;overflow:hidden;
      animation:cardFlip .3s ease-out;
    }
    @keyframes cardFlip{from{transform:rotateY(90deg) scale(.8);opacity:0}to{transform:rotateY(0) scale(1);opacity:1}}
    .card-category{
      background:var(--pink);color:white;font-size:.55rem;
      padding:8px 14px;letter-spacing:.08em;display:flex;align-items:center;gap:6px;
    }
    .card-player-section{
      background:var(--light-pink);padding:14px;text-align:center;
      border-bottom:3px solid var(--shadow);
    }
    .card-player-label{font-size:.5rem;color:#9333ea;margin-bottom:6px}
    .card-player-name{
      font-size:clamp(1rem,5vw,1.5rem);color:var(--hot-pink);
      text-shadow:3px 3px 0 var(--shadow);animation:namePop .4s ease-out;
    }
    @keyframes namePop{0%{transform:scale(.5) rotate(-5deg);opacity:0}70%{transform:scale(1.1) rotate(2deg);opacity:1}100%{transform:scale(1);opacity:1}}
    .card-body{flex:1;padding:20px 16px;display:flex;align-items:center;justify-content:center}
    .card-task-text{font-size:clamp(.58rem,2.5vw,.8rem);color:var(--text-dark);line-height:2.1;text-align:center}
    .card-player-inline{color:var(--hot-pink);font-weight:bold}
    .card-player2-inline{color:var(--dark-purple);font-weight:bold}

    /* BOMB SCREEN */
    #screen-bomb{background:#0a0010;z-index:50}
    .bomb-screen-inner{display:flex;flex-direction:column;align-items:center;gap:16px;z-index:2}
    .bomb-emoji-wrap{position:relative;text-align:center}
    .bomb-big{font-size:clamp(4rem,18vw,7rem);display:block;animation:bombBig .6s ease-out .2s both;filter:drop-shadow(0 0 24px #ff4400)}
    @keyframes bombBig{0%{transform:scale(0) rotate(-30deg);opacity:0}60%{transform:scale(1.3) rotate(5deg);opacity:1}100%{transform:scale(1);opacity:1}}
    .explosion-rings{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
    .ring{position:absolute;border-radius:50%;border:4px solid var(--gold);animation:expandRing 1s ease-out forwards;opacity:0;width:80px;height:80px}
    .ring:nth-child(1){animation-delay:.3s;border-color:#ff4400}
    .ring:nth-child(2){animation-delay:.45s;border-color:var(--gold)}
    .ring:nth-child(3){animation-delay:.6s;border-color:#fff}
    @keyframes expandRing{from{transform:scale(1);opacity:.9}to{transform:scale(5);opacity:0}}
    .boom-text{
      font-size:clamp(1.8rem,9vw,3rem);color:var(--gold);
      text-shadow:4px 4px 0 #ff4400,8px 8px 0 #7c1400;
      animation:boomIn .5s cubic-bezier(.34,1.56,.64,1) .5s both;letter-spacing:.06em;text-align:center;
    }
    @keyframes boomIn{from{transform:scale(0) rotate(-10deg);opacity:0}to{transform:scale(1);opacity:1}}
    .bomb-message{font-size:clamp(.55rem,2.5vw,.75rem);color:var(--lavender);text-align:center;line-height:2;animation:fadeInUp .5s ease-out 1s both;max-width:340px}
    .bomb-loser{font-size:clamp(.65rem,3vw,.9rem);color:var(--gold);text-align:center;animation:fadeInUp .5s ease-out 1.3s both}
    @keyframes fadeInUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    .bomb-btn-wrap{display:flex;flex-direction:column;align-items:center;width:100%;gap:10px;animation:fadeInUp .5s ease-out 1.6s both}

    /* BOMB SHAKE CLASS */
    .bomb-shake{animation:shake .5s ease-out}

    /* COUNTDOWN */
    #screen-countdown{gap:16px;text-align:center}
    .countdown-number{font-size:clamp(4rem,20vw,8rem);color:var(--gold);text-shadow:6px 6px 0 var(--shadow);animation:countBounce .7s ease-out}
    @keyframes countBounce{0%{transform:scale(2);opacity:0}60%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
    .countdown-label{font-size:clamp(.5rem,2.5vw,.8rem);color:var(--lavender);letter-spacing:.1em}

    /* MISC */
    .sparkle-row{font-size:1.1rem;letter-spacing:5px;color:var(--lavender);opacity:.7}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--purple);border-radius:3px}

    @media(min-width:500px){
      .title-main{font-size:2.6rem}
      .card-task-text{font-size:.8rem}
    }
  </style>
</head>
<body>
  <div id="particles"></div>

  <!-- WELCOME -->
  <div id="screen-welcome" class="screen active">
    <div class="logo-wrap">
      <span class="logo-icon">✨</span>
      <h1 class="title-main">PICCOLO<br>REMIX</h1>
      <span class="logo-icon">✨</span>
    </div>
    <div class="title-sub">the fun version</div>
    <div class="sparkle-row">♥ ★ ♥ ★ ♥</div>
    <div class="welcome-tagline">tasks · dares · spotify · chaos</div>
    <button class="btn btn-primary" id="btn-play">PLAY!</button>
    <button class="btn btn-ghost" id="btn-music-toggle">🎵 MUSIC: ON</button>
  </div>

  <!-- PLAYERS -->
  <div id="screen-players" class="screen">
    <div class="screen-title">👑 WHO'S PLAYING?</div>
    <div class="input-row">
      <input class="input-name" id="name-input" type="text" maxlength="18" placeholder="player name..." autocomplete="off" autocorrect="off">
      <button class="btn-add" id="btn-add-player">+</button>
    </div>
    <div class="player-list" id="player-list"></div>
    <div class="player-hint" id="player-hint">add 2–8 players to start!</div>
    <button class="btn btn-gold" id="btn-start-game" disabled>START GAME! ★</button>
    <button class="btn btn-ghost" id="btn-back-welcome">back</button>
  </div>

  <!-- COUNTDOWN -->
  <div id="screen-countdown" class="screen">
    <div class="countdown-label">✨ game starts in ✨</div>
    <div class="countdown-number" id="countdown-num">3</div>
  </div>

  <!-- GAME -->
  <div id="screen-game" class="screen">
    <div class="game-header">
      <div class="round-badge">ROUND <span id="round-num">1</span></div>
      <div class="bomb-indicator" id="bomb-indicator">💣</div>
    </div>
    <div class="task-card" id="task-card">
      <div class="card-category" id="card-category">🎴 TASK</div>
      <div class="card-player-section">
        <div class="card-player-label">it's your turn,</div>
        <div class="card-player-name" id="card-player-name">PLAYER</div>
      </div>
      <div class="card-body">
        <div class="card-task-text" id="card-task-text">loading...</div>
      </div>
    </div>
    <button class="btn btn-primary" id="btn-next-card">NEXT CARD ▶</button>
    <button class="btn btn-ghost" id="btn-end-game">end game</button>
  </div>

  <!-- BOMB -->
  <div id="screen-bomb" class="screen">
    <div class="bomb-screen-inner">
      <div class="bomb-emoji-wrap">
        <span class="bomb-big">💥</span>
        <div class="explosion-rings">
          <div class="ring"></div>
          <div class="ring"></div>
          <div class="ring"></div>
        </div>
      </div>
      <div class="boom-text">BOOM!</div>
      <div class="bomb-loser" id="bomb-loser-text"></div>
      <div class="bomb-message">the bomb exploded! the game is over.<br>✨ thanks for playing ✨</div>
      <div class="bomb-btn-wrap">
        <button class="btn btn-gold" id="btn-play-again">PLAY AGAIN! ♥</button>
      </div>
    </div>
  </div>

  <script>
  /* ============================================================
     AUDIO ENGINE
  ============================================================ */
  const Audio = (() => {
    let ctx, masterGain, bgmGain;
    let bgmPlaying = false, bgmHandle = null, bgmNextTime = 0;
    let musicEnabled = true;

    const NOTE = {
      C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,
      C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00,B5:987.77,C6:1046.50,
      R:0
    };

    // Melody: [freq, beats]  BPM=125
    const MELODY = [
      [NOTE.E5,1],[NOTE.G5,1],[NOTE.A5,1],[NOTE.G5,1],
      [NOTE.E5,2],[NOTE.C5,2],
      [NOTE.G4,1],[NOTE.A4,1],[NOTE.C5,1],[NOTE.A4,1],
      [NOTE.G4,4],
      [NOTE.A5,1],[NOTE.G5,1],[NOTE.E5,1],[NOTE.D5,1],
      [NOTE.E5,2],[NOTE.C5,1],[NOTE.R,1],
      [NOTE.D5,1],[NOTE.E5,1],[NOTE.G5,1],[NOTE.E5,1],
      [NOTE.C5,2],[NOTE.R,2],
      [NOTE.C5,1],[NOTE.E5,1],[NOTE.G5,1],[NOTE.A5,1],
      [NOTE.C6,2],[NOTE.A5,2],
      [NOTE.G5,1],[NOTE.E5,1],[NOTE.D5,1],[NOTE.E5,1],
      [NOTE.C5,4]
    ];

    const BASS = [
      [NOTE.C4,2],[NOTE.G4,2],[NOTE.A4,2],[NOTE.E4,2],
      [NOTE.C4,2],[NOTE.G4,2],[NOTE.F4,2],[NOTE.G4,2],
      [NOTE.A4,2],[NOTE.E4,2],[NOTE.F4,2],[NOTE.G4,2],
      [NOTE.C4,2],[NOTE.G4,2],[NOTE.C4,4]
    ];

    const BEAT = 60/125;
    const MELODY_DUR = MELODY.reduce((s,[,b])=>s+b*BEAT,0);

    function init() {
      if (ctx) return;
      ctx = new (window.AudioContext||window.webkitAudioContext)();
      masterGain = ctx.createGain(); masterGain.gain.value = 0.28;
      masterGain.connect(ctx.destination);
      bgmGain = ctx.createGain(); bgmGain.gain.value = 0.7;
      bgmGain.connect(masterGain);
    }

    function playNote(freq,start,dur,vol=0.1,type='square',dest=null) {
      if (!ctx||freq<=0) return;
      const osc = ctx.createOscillator();
      const g   = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0,start);
      g.gain.linearRampToValueAtTime(vol,start+0.01);
      g.gain.setValueAtTime(vol,start+dur-0.025);
      g.gain.linearRampToValueAtTime(0,start+dur);
      osc.connect(g);
      g.connect(dest||masterGain);
      osc.start(start);
      osc.stop(start+dur+0.05);
    }

    function scheduleLoop(startT) {
      let t = startT;
      MELODY.forEach(([f,b]) => { playNote(f,t,b*BEAT*0.88,0.07,'square',bgmGain); t+=b*BEAT; });
      t = startT;
      BASS.forEach(([f,b]) => { playNote(f,t,b*BEAT*0.75,0.04,'triangle',bgmGain); t+=b*BEAT; });
    }

    function scheduleBGM() {
      if (!bgmPlaying) return;
      const AHEAD = 0.4;
      while (bgmNextTime < ctx.currentTime + AHEAD) {
        scheduleLoop(bgmNextTime);
        bgmNextTime += MELODY_DUR;
      }
      bgmHandle = setTimeout(scheduleBGM, AHEAD*500);
    }

    function startBGM() {
      init();
      if (!musicEnabled||bgmPlaying) return;
      bgmPlaying = true;
      bgmNextTime = ctx.currentTime + 0.15;
      scheduleBGM();
    }

    function stopBGM() {
      bgmPlaying = false;
      if (bgmHandle) clearTimeout(bgmHandle);
      if (bgmGain) {
        bgmGain.gain.linearRampToValueAtTime(0, ctx.currentTime+0.3);
        setTimeout(()=>{ if(bgmGain) bgmGain.gain.value=0.7; },400);
      }
    }

    function playBomb() {
      init();
      const t = ctx.currentTime;
      // fuse beeps
      [440,554,659,880].forEach((f,i)=>{
        playNote(f,t+i*0.12,0.1,0.18,'square');
      });
      // white noise explosion
      const bufLen = Math.floor(ctx.sampleRate*1.8);
      const buf = ctx.createBuffer(1,bufLen,ctx.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<bufLen;i++) data[i]=(Math.random()*2-1);
      const ns = ctx.createBufferSource(); ns.buffer=buf;
      const ng = ctx.createGain();
      ng.gain.setValueAtTime(0,t+0.5);
      ng.gain.linearRampToValueAtTime(0.35,t+0.55);
      ng.gain.linearRampToValueAtTime(0,t+2);
      const flt = ctx.createBiquadFilter(); flt.type='lowpass';
      flt.frequency.setValueAtTime(800,t+0.5);
      flt.frequency.linearRampToValueAtTime(150,t+2);
      ns.connect(flt); flt.connect(ng); ng.connect(masterGain);
      ns.start(t+0.5); ns.stop(t+2.1);
      // low boom
      playNote(55,t+0.5,1.0,0.45,'sine');
      playNote(80,t+0.5,0.7,0.3,'sine');
    }

    function playBlip() {
      init();
      const t = ctx.currentTime;
      playNote(880,t,0.07,0.12,'square');
    }

    function playSuccess() {
      init();
      const t = ctx.currentTime;
      [523,659,784,1047].forEach((f,i)=> playNote(f,t+i*0.1,0.12,0.1,'square'));
    }

    function toggleMusic() {
      musicEnabled = !musicEnabled;
      if (musicEnabled) startBGM();
      else stopBGM();
      return musicEnabled;
    }

    return { startBGM, stopBGM, playBomb, playBlip, playSuccess, toggleMusic, init,
             isMusicEnabled: ()=>musicEnabled };
  })();

  /* ============================================================
     TASKS
  ============================================================ */
  const TASKS = [
    // DANCE / BUST A JIVE
    { cat:'🕺 BUST A JIVE', text:'{P} has 15 seconds to bust their BEST dance move. Everyone votes — if you get majority approval, give out 2 sips!' },
    { cat:'🕺 BUST A JIVE', text:'Dance battle! {P} vs {P2} right now. Everyone else is the jury. Loser of the crowd vote drinks 2!' },
    { cat:'🕺 BUST A JIVE', text:'{P} must do the robot every single time someone says the word "drink" for the next 3 rounds.' },
    { cat:'🕺 BUST A JIVE', text:'Air band time! {P} picks a song in their head and air-plays a full 20 seconds. No stopping!' },
    { cat:'🕺 BUST A JIVE', text:'{P} teaches everyone one dance move right now. If anyone can copy it perfectly, {P} drinks!' },
    { cat:'🕺 BUST A JIVE', text:'Freeze dance! {P} starts dancing. When they randomly stop, everyone must freeze. Last to freeze drinks!' },
    { cat:'🕺 BUST A JIVE', text:'{P} must moonwalk across the room and back. No laughing allowed — laughers drink!' },
    { cat:'🕺 BUST A JIVE', text:'Vibe check! {P} has 30 seconds to do their best disco impression. Group scores it out of 10.' },
    // SPOTIFY
    { cat:'🎧 SPOTIFY DAYLIST', text:'DAYLIST DROP! {P}, open Spotify right now and read your Daylist title out loud. If it’s chaotic or unhinged, everyone drinks!' },
    { cat:'🎧 SPOTIFY DAYLIST', text:'Predict it! Everyone guesses what {P}’s current Spotify Daylist title says. {P} checks and reveals. Wrong guessers drink!' },
    { cat:'🎧 SPOTIFY DAYLIST', text:'{P2} has to describe {P}’s music vibe in exactly 3 words. If {P} agrees with all 3, {P2} is spared. Otherwise {P2} drinks!' },
    { cat:'🎧 SPOTIFY DAYLIST', text:'Mood match: {P} reads their Daylist title. Group decides if it actually matches their energy tonight. Jury vote — guilty = 2 sips!' },

  /* ============================================================
     PARTICLES
  ============================================================ */
  (function spawnParticles() {
    const container = document.getElementById('particles');
    const ICONS = ['✨','♥','★','🌸','💫','🪄','🦛','🎀','🌟','🌊'];
    for (let i=0; i<35; i++) {
      const el = document.createElement('div');
      el.className = 'particle';
      el.textContent = ICONS[Math.floor(Math.random()*ICONS.length)];
      el.style.left = Math.random()*100 + '%';
      el.style.fontSize = (.6 + Math.random()*.8) + 'rem';
      el.style.animationDuration = (8 + Math.random()*14) + 's';
      el.style.animationDelay   = (-Math.random()*20) + 's';
      el.style.opacity = '0';
      container.appendChild(el);
    }
  })();

  /* ============================================================
     GAME STATE
  ============================================================ */
  let players = [];
  let deck    = [];
  let round   = 0;
  let bombPos = 0;

  function buildDeck() {
    const shuffled = [...TASKS].sort(()=>Math.random()-0.5);
    // bomb goes somewhere between round 8 and round 20
    bombPos = 8 + Math.floor(Math.random()*13);
    deck = shuffled;
    round = 0;
  }

  function getTask() {
    return deck[round % deck.length];
  }

  function fillTask(task) {
    const p  = players[round % players.length];
    let p2idx = (round+1) % players.length;
    if (players.length>1 && p2idx === (round % players.length)) p2idx = (p2idx+1)%players.length;
    const p2 = players[p2idx];
    return {
      text: task.text
        .replace(/\{P2\}/g, `<span class="card-player2-inline">${p2}</span>`)
        .replace(/\{P\}/g,  `<span class="card-player-inline">${p}</span>`),
      player: p,
      cat: task.cat
    };
  }

  /* ============================================================
     SCREEN MANAGEMENT
  ============================================================ */
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => {
      s.classList.remove('active');
    });
    const target = document.getElementById(id);
    target.classList.add('active');
  }

  /* ============================================================
     COUNTDOWN
  ============================================================ */
  function startCountdown(cb) {
    showScreen('screen-countdown');
    let n = 3;
    const numEl = document.getElementById('countdown-num');
    numEl.textContent = n;
    const tick = setInterval(() => {
      n--;
      if (n <= 0) {
        clearInterval(tick);
        numEl.textContent = '🌊 GO!';
        numEl.style.fontSize = 'clamp(2rem,10vw,4rem)';
        setTimeout(() => { numEl.style.fontSize = ''; cb(); }, 700);
      } else {
        numEl.textContent = n;
        // re-trigger animation via style reset
        numEl.style.animation = 'none';
        void numEl.offsetWidth;
        numEl.style.animation = '';
        Audio.playBlip();
      }
    }, 800);
    Audio.playBlip();
  }

  /* ============================================================
     RENDER CARD
  ============================================================ */
  function renderCard() {
    const task   = getTask();
    const filled = fillTask(task);

    document.getElementById('round-num').textContent       = round + 1;
    document.getElementById('card-category').textContent   = filled.cat;
    // set color per category type
    const catEl = document.getElementById('card-category');
    const catColors = {
      '🕺': '#ff69b4',
      '🎧': '#a855f7',
      '📝': '#10b981',
      '👻': '#f97316',
      '👑': '#eab308',
      '🎭': '#ec4899',
      '📱': '#3b82f6',
      '🙈': '#ef4444',
      '🎮': '#8b5cf6',
      '🌈': '#06b6d4',
    };
    const catKey = Object.keys(catColors).find(k => filled.cat.includes(k));
    catEl.style.background = catKey ? catColors[catKey] : 'var(--pink)';
    catEl.innerHTML = filled.cat;

    document.getElementById('card-player-name').textContent = filled.player;
    document.getElementById('card-task-text').innerHTML     = filled.text;

    // bomb danger mode after 60% of bombPos
    const danger = round >= Math.floor(bombPos * 0.6);
    const indicator = document.getElementById('bomb-indicator');
    indicator.classList.toggle('danger', danger);

    // re-trigger card flip animation via style reset
    const card = document.getElementById('task-card');
    card.style.animation = 'none';
    void card.offsetWidth;
    card.style.animation = 'cardFlip .3s ease-out';
  }

  /* ============================================================
     EVENT LISTENERS
  ============================================================ */
  // Welcome
  document.getElementById('btn-play').addEventListener('click', () => {
    Audio.init();
    Audio.playBlip();
    showScreen('screen-players');
  });

  document.getElementById('btn-music-toggle').addEventListener('click', () => {
    Audio.init();
    const on = Audio.toggleMusic();
    document.getElementById('btn-music-toggle').textContent =
      on ? '🎵 MUSIC: ON' : '🔇 MUSIC: OFF';
    Audio.playBlip();
  });

  // Players
  function addPlayer() {
    const input = document.getElementById('name-input');
    const name  = input.value.trim();
    if (!name || players.length >= 8) return;
    if (players.includes(name)) { input.value=''; return; }
    players.push(name);
    input.value = '';
    renderPlayerList();
    Audio.playBlip();
  }

  function renderPlayerList() {
    const list  = document.getElementById('player-list');
    const hint  = document.getElementById('player-hint');
    const btn   = document.getElementById('btn-start-game');
    list.innerHTML = '';
    players.forEach((p,i) => {
      const chip = document.createElement('div');
      chip.className = 'player-chip';
      chip.innerHTML = '<span>\u2665 ' + p + '</span><button class="player-remove" data-i="' + i + '">\u2715</button>';
      chip.querySelector('.player-remove').addEventListener('click', () => {
        players.splice(i,1);
        renderPlayerList();
      });
      list.appendChild(chip);
    });
    const n = players.length;
    hint.textContent = n === 0 ? 'add 2–8 players to start!'
                     : n === 1 ? 'add at least one more player!'
                     : n + ' players ready! \u2605';
    btn.disabled = n < 2;
  }

  document.getElementById('btn-add-player').addEventListener('click', addPlayer);
  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addPlayer();
  });

  document.getElementById('btn-start-game').addEventListener('click', () => {
    if (players.length < 2) return;
    Audio.playSuccess();
    buildDeck();
    startCountdown(() => {
      renderCard();
      showScreen('screen-game');
      Audio.startBGM();
    });
  });

  document.getElementById('btn-back-welcome').addEventListener('click', () => {
    Audio.playBlip();
    players = [];
    renderPlayerList();
    showScreen('screen-welcome');
  });

  // Game
  document.getElementById('btn-next-card').addEventListener('click', () => {
    round++;
    if (round >= bombPos) {
      // BOMB!
      Audio.stopBGM();
      setTimeout(() => Audio.playBomb(), 100);
      const loser = players[round % players.length];
      document.getElementById('bomb-loser-text').textContent =
        '💣 ' + loser + ' triggered the bomb!';
      showScreen('screen-bomb');
      // shake the bomb screen
      document.getElementById('screen-bomb').classList.remove('bomb-shake');
      void document.getElementById('screen-bomb').offsetWidth;
      document.getElementById('screen-bomb').classList.add('bomb-shake');
    } else {
      Audio.playBlip();
      renderCard();
    }
  });

  document.getElementById('btn-end-game').addEventListener('click', () => {
    Audio.playBlip();
    Audio.stopBGM();
    players = [];
    renderPlayerList();
    showScreen('screen-welcome');
  });

  // Bomb
  document.getElementById('btn-play-again').addEventListener('click', () => {
    Audio.playBlip();
    players = [];
    renderPlayerList();
    showScreen('screen-players');
  });

  /* ============================================================
     INITIAL RENDER
  ============================================================ */
  renderPlayerList();
  </script>
